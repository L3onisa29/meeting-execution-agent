services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meeting_execution_agent}
      POSTGRES_USER: ${POSTGRES_USER:-meeting_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting_agent}
    ports:
      - "${POSTGRES_PORT_BIND:-127.0.0.1:5432}:5432"
    volumes:
      - meeting_execution_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT_BIND:-127.0.0.1:6379}:6379"
    volumes:
      - meeting_execution_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meeting_execution_postgres:
  meeting_execution_redis:
