[project]
name = "agent-core"
version = "0.1.0"
description = "Core meeting extraction and action proposal workflow."
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.0",
  "langgraph>=0.5.0",
  "pydantic>=2.11.0",
  "tenacity>=9.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_core"]

